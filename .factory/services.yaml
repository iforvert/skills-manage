commands:
  install: pnpm install
  typecheck: pnpm typecheck
  lint: pnpm lint
  test: pnpm exec vitest run src/test/platformStore.test.ts src/test/PlatformView.test.tsx src/test/SkillDetailView.test.tsx src/test/skillDetailStore.test.ts && cargo test --manifest-path src-tauri/Cargo.toml scanner::tests:: && cargo test --manifest-path src-tauri/Cargo.toml skills::tests:: && cargo test --manifest-path src-tauri/Cargo.toml linker::tests::
  test-frontend-targeted: pnpm exec vitest run src/test/platformStore.test.ts src/test/PlatformView.test.tsx src/test/SkillDetailView.test.tsx src/test/skillDetailStore.test.ts
  test-rust-targeted: cargo test --manifest-path src-tauri/Cargo.toml scanner::tests:: && cargo test --manifest-path src-tauri/Cargo.toml skills::tests:: && cargo test --manifest-path src-tauri/Cargo.toml linker::tests::
  clippy: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
  build: pnpm tauri build
  manual-validation-real-home: pnpm tauri dev
  manual-validation-isolated-reuse-devurl-24200: HOME=/tmp/skills-manage-test-fixtures/claude-multi-source pnpm tauri dev --no-dev-server-wait -c '{"build":{"beforeDevCommand":"","devUrl":"http://localhost:24200"}}'

services:
  tauri-dev-isolated:
    start: HOME=/tmp/skills-manage-test-fixtures/claude-multi-source pnpm tauri dev
    stop: lsof -ti :24200 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:24200
    port: 24200
    depends_on: []
